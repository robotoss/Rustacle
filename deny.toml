[advisories]
# cargo-deny v0.16+ removed per-field severity keys.
# Use `ignore` to suppress specific advisories if needed.
# Tauri v2 transitive deps — unmaintained gtk3-rs bindings, no upgrade available
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error (unmaintained, via gtk3-rs)
    "RUSTSEC-2024-0411", # gdkwayland-sys (gtk3-rs unmaintained)
    "RUSTSEC-2024-0412", # gdk (gtk3-rs unmaintained)
    "RUSTSEC-2024-0413", # atk (gtk3-rs unmaintained)
    "RUSTSEC-2024-0414", # gdkx11-sys (gtk3-rs unmaintained)
    "RUSTSEC-2024-0415", # gtk (gtk3-rs unmaintained)
    "RUSTSEC-2024-0416", # atk-sys (gtk3-rs unmaintained)
    "RUSTSEC-2024-0417", # gdkx11 (gtk3-rs unmaintained)
    "RUSTSEC-2024-0418", # gdk-sys (gtk3-rs unmaintained)
    "RUSTSEC-2024-0419", # gtk3-macros (gtk3-rs unmaintained)
    "RUSTSEC-2024-0420", # gtk-sys (gtk3-rs unmaintained)
    "RUSTSEC-2024-0436", # paste (unmaintained, via specta/tauri)
    "RUSTSEC-2025-0057", # fxhash (unmaintained, via selectors/tauri-utils)
    "RUSTSEC-2025-0075", # unic-char-range (unmaintained, via urlpattern/tauri-utils)
    "RUSTSEC-2025-0080", # unic-common (unmaintained, via urlpattern/tauri-utils)
    "RUSTSEC-2025-0081", # unic-char-property (unmaintained, via urlpattern/tauri-utils)
    "RUSTSEC-2025-0098", # unic-ucd-version (unmaintained, via urlpattern/tauri-utils)
    "RUSTSEC-2025-0100", # unic-ucd-ident (unmaintained, via urlpattern/tauri-utils)
    "RUSTSEC-2026-0009", # time DoS via stack exhaustion (via cookie/tauri, waiting on tauri upgrade)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
allow-git = []
